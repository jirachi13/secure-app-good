name: DevSecOps Pipeline (Advanced)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: secure-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─── Job 1: Secret Scan ───────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 2: SAST Scan ─────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  # ─── Job 3: Dependency Scan ───────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit and save output
        run: pip-audit -r requirements.txt | tee dependency-scan.txt

      - name: Upload dependency scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan
          path: dependency-scan.txt

  # ─── Job 4: Build and Container Scan ─────────────────────────────────────
  build-and-scan:
    name: Build, Container Scan, and SBOM
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          output: trivy-report.txt
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Save image as tarball
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload image tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # ─── Job 5: Promote Trusted Build ────────────────────────────────────────
  promote:
    name: Promote Trusted Build
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - name: Generate trusted build marker
        run: |
          echo "TRUSTED BUILD" > trusted-build.txt
          echo "Image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> trusted-build.txt
          echo "Commit: ${{ github.sha }}" >> trusted-build.txt
          echo "Branch: ${{ github.ref_name }}" >> trusted-build.txt
          echo "Timestamp: $(date -u)" >> trusted-build.txt
          echo "Passed: secret-scan, sast-scan, dependency-scan, container-scan, sbom-generation" >> trusted-build.txt

      - name: Upload trusted build marker
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build
          path: trusted-build.txt

      - name: Pipeline complete
        run: |
          echo "✅ All security gates passed."
          echo "✅ SBOM generated and archived."
          echo "✅ Image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} is promotable."
